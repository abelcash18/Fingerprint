<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fingerprint Scan</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="scan">
        <!-- Fingerprint Animation Container -->
        <div class="fingerprint" id="fingerprint">
            <svg viewBox="0 0 120 140" aria-hidden="true" focusable="false">
                <g fill="none" stroke="#0ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Center Core Loops -->
                    <path d="M60 125 C60 100 58 85 54 75 C50 65 54 58 60 58 C66 58 70 65 66 75 C62 85 60 100 60 125" opacity="0.9"/>
                    <path d="M60 105 C60 92 56 80 50 72 C44 62 50 50 60 50 C70 50 76 62 70 72 C64 80 60 92 60 105" opacity="0.8"/>
                    
                    <!-- Inner Ridges -->
                    <path d="M40 120 C42 100 44 85 38 72 C32 58 42 40 60 40 C78 40 88 58 82 72 C76 85 78 100 80 120" opacity="0.7"/>
                    <path d="M48 130 C48 115 50 100 46 90" opacity="0.6"/>
                    <path d="M72 130 C72 115 70 100 74 90" opacity="0.6"/>
                    
                    <!-- Outer Arcs -->
                    <path d="M22 110 C26 90 30 75 24 60 C16 42 34 26 60 26 C86 26 104 42 96 60 C90 75 94 90 98 110" opacity="0.5"/>
                    <path d="M15 90 C18 78 14 62 20 45 C30 20 50 14 60 14 C70 14 90 20 100 45 C106 62 102 78 105 90" opacity="0.3"/>
                </g>
            </svg>
            <div class="scan-line" aria-hidden="true"></div>
        </div>

        <!-- Status Messaging -->
        <h3 id="status" aria-live="polite">Scanning...</h3>
        
        <!-- Accessible Progress Bar -->
        <div class="progress" 
             role="progressbar" 
             id="progress-bar"
             aria-valuenow="0" 
             aria-valuemin="0" 
             aria-valuemax="100">
            <span id="percent">0%</span>
        </div>

        <!-- Dynamic Controls -->
        <div style="display: flex; gap: 8px; justify-content: center; margin-top: 12px;">
            <button type="button" id="use-bio">Use Biometric</button>
            <button type="button" id="restart" hidden>Restart</button>
        </div>
    </div>

   <script src="index.js"></script>
</body>
</html>
